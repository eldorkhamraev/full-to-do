<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Tasks</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #F7F5F0;
      --card: #FFFFFF;
      --text: #1A1A1A;
      --muted: #888;
      --border: #E5E2DA;
      --accent: #2D6A4F;
      --accent-light: #D8F3DC;
      --danger: #E63946;
      --done-color: #aaa;
      --radius: 12px;
    }

    [data-theme="dark"] {
      --bg: #111110;
      --card: #1C1C1A;
      --text: #EDECE8;
      --muted: #666;
      --border: #2A2A28;
      --accent: #52B788;
      --accent-light: #1B3A2D;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
      transition: background 0.3s, color 0.3s;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .header {
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 2.4rem;
      font-weight: 400;
      letter-spacing: -0.5px;
    }

    .header p {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 4px;
      font-weight: 300;
    }

    .streak-badge {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 400;
      min-height: 1.1rem;
    }

    .header-controls {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .dark-toggle,
    .focus-btn,
    .palette-btn {
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
    }

    .dark-toggle:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .focus-btn {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      font-weight: 500;
      font-size: 0.9rem;
      padding: 10px 22px;
      border-radius: 24px;
      letter-spacing: 0.3px;
      box-shadow: 0 2px 12px rgba(45, 106, 79, 0.25);
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .focus-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 18px rgba(45, 106, 79, 0.35);
      background: var(--accent);
      color: white;
      opacity: 0.92;
    }

    .palette-btn {
      width: 32px;
      height: 32px;
      padding: 0;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      position: relative;
    }

    /* Palette panel */
    .palette-panel {
      position: absolute;
      top: 44px;
      right: 0;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      gap: 8px;
      z-index: 300;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
    }

    .palette-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.2s;
    }

    .palette-swatch:hover {
      transform: scale(1.2);
    }

    .palette-swatch.active {
      border-color: var(--text);
    }

    .header-right {
      position: relative;
    }

    /* Rings section */
    .rings-section {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .ring-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .ring-svg {
      width: 60px;
      height: 60px;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: var(--border);
      stroke-width: 3.5;
    }

    .ring-fill-high {
      fill: none;
      stroke: #E74C3C;
      stroke-width: 3.5;
      stroke-linecap: round;
      transition: stroke-dasharray 0.5s ease;
    }

    .ring-fill-medium {
      fill: none;
      stroke: #E67E22;
      stroke-width: 3.5;
      stroke-linecap: round;
      transition: stroke-dasharray 0.5s ease;
    }

    .ring-fill-low {
      fill: none;
      stroke: #27AE60;
      stroke-width: 3.5;
      stroke-linecap: round;
      transition: stroke-dasharray 0.5s ease;
    }

    .ring-text {
      font-size: 7px;
      fill: var(--muted);
      transform: rotate(90deg) translate(0px, -36px);
      transform-box: fill-box;
    }

    .ring-label {
      font-size: 0.72rem;
      color: var(--muted);
      font-weight: 400;
    }

    .input-section {
      display: flex;
      gap: 8px;
      margin-bottom: 0.75rem;
    }

    .input-section input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      background: var(--card);
      color: var(--text);
      outline: none;
    }

    .input-section input:focus {
      border-color: var(--accent);
    }

    .input-section input::placeholder {
      color: var(--muted);
    }

    .input-section button {
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
    }

    .input-section button:hover {
      opacity: 0.85;
    }

    /* Priority picker (step 2) */
    .priority-picker {
      display: none;
      gap: 8px;
      align-items: center;
      margin-bottom: 1rem;
      padding: 10px 14px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      animation: fadeIn 0.15s ease;
      flex-wrap: wrap;
    }

    .priority-picker .picker-label {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 400;
    }

    .pri-btn {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      font-weight: 500;
      border: 1.5px solid;
    }

    .pri-btn[data-p="high"] {
      color: #C0392B;
      border-color: #F5C0BB;
      background: #FEF0EE;
    }

    .pri-btn[data-p="medium"] {
      color: #B7600A;
      border-color: #FAD9A8;
      background: #FEF3E2;
    }

    .pri-btn[data-p="low"] {
      color: #1A6B3C;
      border-color: #A8DFC0;
      background: #EAFAF1;
    }

    .pri-btn[data-p="none"] {
      color: var(--muted);
      border-color: var(--border);
      background: transparent;
    }

    /* Unified filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 1.1rem;
      flex-wrap: wrap;
      padding: 6px 10px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
    }

    .filter-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 4px;
      flex-shrink: 0;
    }

    .filter-btn {
      padding: 4px 12px;
      border: none;
      border-radius: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .filter-btn:hover {
      color: var(--text);
    }

    .filter-btn.active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
    }

    .pfil-btn {
      padding: 4px 10px;
      border-radius: 16px;
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      font-weight: 400;
      border: none;
      background: transparent;
      color: var(--muted);
      transition: background 0.15s, color 0.15s;
    }

    .pfil-btn:hover {
      color: var(--text);
    }

    .pfil-btn.active[data-p="high"] {
      background: #FEF0EE;
      color: #C0392B;
      font-weight: 500;
    }

    .pfil-btn.active[data-p="medium"] {
      background: #FEF3E2;
      color: #B7600A;
      font-weight: 500;
    }

    .pfil-btn.active[data-p="low"] {
      background: #EAFAF1;
      color: #1A6B3C;
      font-weight: 500;
    }

    .sort-toggle {
      margin-left: auto;
      padding: 4px 10px;
      border-radius: 16px;
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--muted);
    }

    .sort-toggle:hover {
      color: var(--accent);
    }

    .progress-bar {
      height: 3px;
      background: var(--border);
      border-radius: 10px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .todo-item {
      display: flex;
      flex-direction: column;
      padding: 12px 14px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      animation: fadeIn 0.2s ease;
      user-select: none;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .task-main-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .todo-item.done {
      opacity: 0.5;
    }

    .todo-item.pending-done {
      opacity: 0.55;
    }

    .todo-item.pending-done .todo-text {
      text-decoration: line-through;
      color: var(--done-color);
    }

    .todo-item.dragging {
      opacity: 0.35;
      border-style: dashed;
    }

    .todo-item.drag-over {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    @keyframes flashGreen {
      0% {
        background: var(--card);
        border-color: var(--border);
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(82, 183, 136, 0);
      }

      15% {
        background: #B8F0D0;
        border-color: #52B788;
        transform: scale(1.03);
        box-shadow: 0 0 20px 4px rgba(82, 183, 136, 0.35);
      }

      40% {
        background: #D8F7E8;
        border-color: #52B788;
        transform: scale(1.01);
        box-shadow: 0 0 30px 8px rgba(82, 183, 136, 0.2);
      }

      70% {
        background: #E8FAF0;
        border-color: #95D5B2;
        transform: scale(1);
        box-shadow: 0 0 12px 2px rgba(82, 183, 136, 0.1);
      }

      100% {
        background: var(--card);
        border-color: var(--border);
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(82, 183, 136, 0);
      }
    }

    .flash-green {
      animation: flashGreen 1.2s ease forwards;
    }

    @keyframes timerFlash {

      0%,
      100% {
        background: var(--card);
        border-color: var(--border);
      }

      50% {
        background: #C8F7DC;
        border-color: #52B788;
      }
    }

    .timer-flash {
      animation: timerFlash 0.5s ease 3;
    }

    .drag-handle {
      color: var(--border);
      cursor: grab;
      font-size: 14px;
      flex-shrink: 0;
    }

    .drag-handle:hover {
      color: var(--muted);
    }

    .priority-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .dot-high {
      background: #E74C3C;
    }

    .dot-medium {
      background: #E67E22;
    }

    .dot-low {
      background: #27AE60;
    }

    .dot-none {
      background: transparent;
    }

    .check-btn {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check-btn:hover {
      border-color: var(--accent);
    }

    .check-btn.checked {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-btn.checked::after {
      content: '';
      display: block;
      width: 5px;
      height: 9px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: var(--text);
      font-weight: 300;
      line-height: 1.4;
      word-break: break-word;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
      color: var(--done-color);
    }

    .edit-input {
      flex: 1;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--text);
      background: transparent;
      border: none;
      outline: none;
      border-bottom: 1.5px solid var(--accent);
    }

    /* Expand chevron button */
    .expand-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--border);
      font-size: 0.85rem;
      padding: 2px 4px;
      flex-shrink: 0;
      transition: color 0.2s, transform 0.2s;
      line-height: 1;
    }

    .expand-btn:hover {
      color: var(--muted);
    }

    .todo-item.expanded .expand-btn {
      transform: rotate(180deg);
      color: var(--accent);
    }

    /* Expansion panel */
    .expansion-panel {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .todo-item.expanded .expansion-panel {
      display: block;
    }

    .notes-area {
      width: 100%;
      min-height: 56px;
      resize: vertical;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--text);
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      outline: none;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .notes-area:focus {
      border-color: var(--accent);
    }

    .notes-area::placeholder {
      color: var(--muted);
    }

    .subtask-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 6px;
    }

    .subtask-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
    }

    .subtask-check {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .subtask-check.done {
      background: var(--accent);
      border-color: var(--accent);
    }

    .subtask-check.done::after {
      content: '';
      display: block;
      width: 3px;
      height: 6px;
      border: 1.5px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(45deg) translate(-1px, -1px);
    }

    .subtask-text {
      flex: 1;
      font-weight: 300;
      color: var(--text);
    }

    .subtask-text.done {
      text-decoration: line-through;
      color: var(--done-color);
    }

    .subtask-del {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--border);
      font-size: 1rem;
      padding: 0 2px;
    }

    .subtask-del:hover {
      color: var(--danger);
    }

    .subtask-input-row {
      display: flex;
      gap: 6px;
    }

    .subtask-input {
      flex: 1;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      background: transparent;
      color: var(--text);
      outline: none;
    }

    .subtask-input:focus {
      border-color: var(--accent);
    }

    .subtask-input::placeholder {
      color: var(--muted);
    }

    /* Timer */
    .timer-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: 2px 4px;
      flex-shrink: 0;
      line-height: 1;
    }

    .timer-btn:hover {
      color: var(--accent);
    }

    .timer-btn.active {
      color: var(--accent);
    }

    .timer-row {
      display: none;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
    }

    .timer-row.visible {
      display: flex;
    }

    .timer-preset {
      font-size: 0.75rem;
      font-family: 'DM Sans', sans-serif;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 6px;
      padding: 2px 4px;
      cursor: pointer;
      outline: none;
    }

    .timer-countdown {
      font-variant-numeric: tabular-nums;
      font-weight: 500;
      min-width: 40px;
      color: var(--accent);
    }

    .timer-pause-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 2px 4px;
    }

    .timer-pause-btn:hover {
      color: var(--accent);
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--border);
      font-size: 1.2rem;
      padding: 2px 4px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      color: var(--danger);
    }

    .footer {
      margin-top: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .clear-btn {
      background: none;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .clear-btn:hover {
      color: var(--danger);
      background: #fdecea;
    }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 300;
    }

    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }

    /* Undo toast */
    .undo-toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      background: #1A1A1A;
      color: white;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 4000;
      white-space: nowrap;
      animation: slideUp 0.3s ease;
    }

    .undo-toast.hidden {
      display: none;
    }

    .undo-toast button {
      background: none;
      border: none;
      color: var(--accent);
      cursor: pointer;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
    }

    @keyframes slideUp {
      from {
        transform: translateX(-50%) translateY(16px);
        opacity: 0;
      }

      to {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
    }

    /* === CINEMATIC FOCUS MODE === */
    .focus-overlay {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 5000;
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
      overflow: hidden;
    }

    .focus-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .focus-overlay-title {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 20px;
      font-family: 'DM Sans', sans-serif;
    }

    /* === Movie selection grid: full-screen cinematic === */
    .movie-grid {
      display: grid;
      /* 5 cards: 2 on top row, 3 on bottom row */
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: 1fr 1fr;
      gap: 8px;
      padding: 0 12px;
      width: 100vw;
      height: calc(100vh - 80px);
    }

    /* Top row: 2 cards each take 3 columns */
    .movie-card:nth-child(1) {
      grid-column: span 3;
    }

    .movie-card:nth-child(2) {
      grid-column: span 3;
    }

    /* Bottom row: 3 cards each take 2 columns */
    .movie-card:nth-child(3) {
      grid-column: span 2;
    }

    .movie-card:nth-child(4) {
      grid-column: span 2;
    }

    .movie-card:nth-child(5) {
      grid-column: span 2;
    }

    .movie-card {
      border-radius: 8px;
      background-size: cover;
      background-position: center top;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, filter 0.3s ease;
      min-height: 0;
    }

    .movie-card:hover {
      transform: scale(1.02);
      filter: brightness(1.12);
      z-index: 2;

    .movie-card-info {
      position: absolute;

    /* Task picker overlay */

    .focus-task-picker h2 {

    /* Cinematic view */
    .focus-cinematic {
      position: fixed;

    .cinematic-bg {

    /* Full-screen image — sharp, no distortion */
    .cinematic-bg img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center;

    .cinematic-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom,
          rgba(0, 0, 0, 0.15) 0%,
          rgba(0, 0, 0, 0.5) 60%,
          rgba(0, 0, 0, 0.82) 100%);
      z-index: 1;
    }

    /* Cinematic content wrapper — centered vertically */
    .cinematic-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 0 2rem;
      max-width: 720px;

    /* Timer shown at top of focus view */
    .cinematic-timer {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.05rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);

      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 6px 22px;
      border-radius: 30px;
    }

    /* Movie quote — italic, gentle */
    .cinematic-task-text {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.3rem, 4vw, 2.4rem);
      color: white;
      text-align: center;
      line-height: 1.45;
      letter-spacing: 0.5px;
      font-style: italic;
      text-shadow: 0 2px 28px rgba(0, 0, 0, 0.7);
    }

    .cinematic-movie-title {
      position: absolute;
      bottom: 36px;
      left: 36px;
      z-index: 2;

    .focus-exit-top {

      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;

    .cinematic-controls {
      position: absolute;
      bottom: 28px;

    .equalizer {

    }

    .equalizer span {
      width: 3px;
      background: white;
      border-radius: 2px;
      animation: equalizeBar 0.8s ease-in-out infinite alternate;
    }

    .equalizer span:nth-child(1) {
      height: 55%;
      animation-delay: 0s;
    }

    .equalizer span:nth-child(2) {

      animation-delay: 0.25s;
    }

    .equalizer span:nth-child(3) {

    @keyframes equalizeBar {
      from {
        transform: scaleY(0.2);
      }

        transform: scaleY(1);
      }
    }

    .equalizer.paused span {

    .cinematic-play-btn {
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);

  </style>
</head>

<body>
  <canvas id="confetti-canvas"></canvas>

  <!-- Undo toast -->

    Task deleted

  <!-- FOCUS: Movie selection overlay -->

  </div>

  <!-- FOCUS: Task picker -->
  <div class="focus-task-picker" id="focus-task-picker">
    <button class="focus-exit-top" onclick="exitFocus()" title="Close">&#10005;</button>
    <h2>What are you focusing on?</h2>
    <div class="focus-task-list" id="focus-task-list"></div>
  </div>

  <!-- FOCUS: Cinematic view -->
  <div class="focus-cinematic" id="focus-cinematic">
    <div class="cinematic-bg" id="cinematic-bg"><img id="cinematic-img" src="" alt="" /></div>
    <div class="cinematic-overlay"></div>
    <button class="focus-exit-top" onclick="exitFocus()" title="Exit">&#10005;</button>
    <div class="cinematic-content">
      <div class="cinematic-timer" id="cinematic-timer" style="display:none"></div>
      <div class="cinematic-task-text" id="cinematic-task-text"></div>
    </div>
    <div class="cinematic-movie-title" id="cinematic-movie-title"></div>
    <div class="cinematic-controls">
      <div class="equalizer paused" id="equalizer">
        <span></span><span></span><span></span>
      </div>
      <button class="cinematic-play-btn" id="cinematic-play-btn" onclick="toggleFocusAudio()">&#9654;</button>
    </div>
  </div>

  <div class="container">
    <div class="header">
      <div>
        <h1>My tasks</h1>
        <p id="date-label"></p>
        <div class="streak-badge" id="streak-badge"></div>
      </div>
      <div class="header-right">
        <div class="header-controls">
          <button class="focus-btn" onclick="openFocus()">&#9654; Focus</button>
          <button class="palette-btn" id="palette-btn" onclick="togglePalette(event)"
            title="Theme color">&#9679;</button>
          <button class="dark-toggle" id="dark-btn" onclick="toggleDark()">Dark mode</button>
        </div>

    <!-- Progress rings -->
    <div class="rings-section">
      <div class="ring-group">
        <svg viewBox="0 0 36 36" class="ring-svg">

          <text class="ring-text" x="18" y="22" text-anchor="middle" id="ring-high-pct">—</text>
        </svg>
        <span class="ring-label">High</span>
      </div>
      <div class="ring-group">
        <svg viewBox="0 0 36 36" class="ring-svg">
          <circle class="ring-track" cx="18" cy="18" r="15.9" />
          <circle class="ring-fill-medium" cx="18" cy="18" r="15.9" id="ring-medium" stroke-dasharray="0 100" />
          <text class="ring-text" x="18" y="22" text-anchor="middle" id="ring-medium-pct">—</text>
        </svg>
        <span class="ring-label">Medium</span>
      </div>
      <div class="ring-group">
        <svg viewBox="0 0 36 36" class="ring-svg">
          <circle class="ring-track" cx="18" cy="18" r="15.9" />
          <circle class="ring-fill-low" cx="18" cy="18" r="15.9" id="ring-low" stroke-dasharray="0 100" />
          <text class="ring-text" x="18" y="22" text-anchor="middle" id="ring-low-pct">—</text>
        </svg>

      </div>
    </div>

    <div class="input-section">
      <input type="text" id="task-input" placeholder="What needs to be done?" />
      <button onclick="addTask()">Add</button>
    </div>

    <!-- Step 2: Priority picker (shown after Add) -->
    <div class="priority-picker" id="priority-picker">
      <span class="picker-label">Priority?</span>
      <button class="pri-btn" data-p="high" onclick="confirmPriority('high')">&#9679; High</button>
      <button class="pri-btn" data-p="medium" onclick="confirmPriority('medium')">&#9679; Medium</button>
      <button class="pri-btn" data-p="low" onclick="confirmPriority('low')">&#9679; Low</button>
      <button class="pri-btn" data-p="none" onclick="confirmPriority('none')">Skip</button>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
      <button class="filter-btn" onclick="setFilter('done',this)">Done</button>

      <div class="filter-divider"></div>

      <button class="pfil-btn" data-p="high" onclick="setPriorityFilter('high',this)">&#9679; High</button>
      <button class="pfil-btn" data-p="medium" onclick="setPriorityFilter('medium',this)">&#9679; Medium</button>
      <button class="pfil-btn" data-p="low" onclick="setPriorityFilter('low',this)">&#9679; Low</button>

      <button class="sort-toggle" id="sort-toggle" onclick="toggleSort()">Recent first</button>

      <div class="progress-fill" id="progress"></div>

    <div class="footer">
      <span id="count-label"></span>
      <button class="clear-btn" onclick="clearDone()">Clear completed</button>
    </div>
  </div>

  <script>
    /* ===== THEMES ===== */
    var THEMES = {
      green: { accent: '#2D6A4F', light: '#D8F3DC', darkAccent: '#52B788' },
      blue: { accent: '#1D6FA4', light: '#D0E9F7', darkAccent: '#4DAAD6' },
      violet: { accent: '#6B3FA0', light: '#E8D8F7', darkAccent: '#A07FCC' },
      rose: { accent: '#C0392B', light: '#FEF0EE', darkAccent: '#E07070' },
      amber: { accent: '#B7600A', light: '#FEF3E2', darkAccent: '#E09A40' },
      slate: { accent: '#445566', light: '#DDE4ED', darkAccent: '#778899' },
    };
    var THEME_COLORS = { green: '#2D6A4F', blue: '#1D6FA4', violet: '#6B3FA0', rose: '#C0392B', amber: '#B7600A', slate: '#445566' };

    /* ===== MOVIES ===== */
    var MOVIES = {
      'dark-knight': { title: 'The Dark Knight', tagline: 'Disciplined & Focused', image: './Dark Knight.jpeg', music: './Dark Knight_music.mp3', quote: 'Building it brick to brick.' },
      'gladiator': { title: 'Gladiator', tagline: 'Brave & Unstoppable', image: './Gladiator.jpeg', music: './Gladiator_music.mp3', quote: 'What we do in life echoes in eternity.' },
      'avatar': { title: 'Avatar', tagline: 'Creative & Free', image: './Avatar.jpeg', music: './Avatar_music.mp3', quote: 'Be Sully. Sully protects.' },
      'interstellar': { title: 'Interstellar', tagline: 'Deep & Boundless', image: './Interstellar.jpeg', music: 'https://streams.ilovemusic.de/iloveradio17.mp3', quote: 'Love is the one thing we\'re capable of perceiving that transcends dimensions of time and space.' },
      'formula1': { title: 'Formula 1', tagline: 'Fast & Fearless', image: './Formula 1.jpeg', music: './formula1_music.mp3', quote: 'He is flying.' },
    };

    /* ===== STATE ===== */
    var todos = [];
    var nextId = 1;
    var filter = 'all';
    var priorityFilter = null;
    var sortOrder = 'newest';
    var dragSrcId = null;
    var darkMode = false;
    var accentTheme = 'green';
    var pendingDoneTimers = {};
    var pendingPriorityTaskText = null;
    var lastDeleted = null;
    var undoToastTimer = null;
    var streakDates = [];
    var activeTimerId = null;
    var activeTimerInterval = null;
    var activeTimerSecondsLeft = 0;
    var activeTimerPaused = false;
    var focusMode = { active: false, movie: null, taskId: null, audio: null, playing: false };

    /* ===== INIT ===== */
    document.getElementById('date-label').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'long', month: 'long', day: 'numeric'
    });

    loadAll();
    buildPalette();
    buildMovieGrid();
    render();

    document.getElementById('task-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addTask();
    });

    document.addEventListener('keydown', function (e) {
      if ((e.metaKey || e.ctrlKey) && e.key === 'z') { e.preventDefault(); undoDelete(); }
      if (e.key === 'Escape' && pendingPriorityTaskText !== null) confirmPriority('none');
    });

    document.addEventListener('click', function (e) {
      var panel = document.getElementById('palette-panel');
      var btn = document.getElementById('palette-btn');
      if (panel.style.display !== 'none' && !panel.contains(e.target) && e.target !== btn) {
        panel.style.display = 'none';
      }
    });

    // Shake to undo
    (function () {
      var lastShake = 0, prev = { x: 0, y: 0, z: 0 };
      function attachShake() {
        window.addEventListener('devicemotion', function (e) {
          var acc = e.accelerationIncludingGravity;
          if (!acc) return;
          var delta = Math.abs(acc.x - prev.x) + Math.abs(acc.y - prev.y) + Math.abs(acc.z - prev.z);
          prev = { x: acc.x, y: acc.y, z: acc.z };
          var now = Date.now();
          if (delta > 30 && now - lastShake > 1000) { lastShake = now; undoDelete(); }
        });
      }
      if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
        document.addEventListener('click', function once() {
          DeviceMotionEvent.requestPermission().then(function (r) { if (r === 'granted') attachShake(); });
          document.removeEventListener('click', once);
        }, { once: true });
      } else {
        attachShake();
      }
    })();

    /* ===== PERSISTENCE ===== */
    function loadAll() {
      // Tasks
      try {
        var saved = localStorage.getItem('tasks_v2');
        if (saved) {
          todos = JSON.parse(saved);
          todos.forEach(function (t) {
            if (!t.createdAt) t.createdAt = Date.now();
            if (!t.subtasks) t.subtasks = [];
            if (t.notes === undefined) t.notes = '';
            if (t.expanded === undefined) t.expanded = false;
            if (!t.timerMinutes) t.timerMinutes = 25;
            t.pendingDone = false;
          });
          if (todos.length > 0) nextId = Math.max.apply(null, todos.map(function (t) { return t.id; })) + 1;
        } else {
          todos = [
            { id: 1, text: 'Buy groceries', done: false, priority: 'medium', createdAt: Date.now() - 3000, subtasks: [], notes: '', expanded: false, timerMinutes: 25, pendingDone: false },
            { id: 2, text: 'Read for 30 minutes', done: true, priority: 'low', createdAt: Date.now() - 2000, subtasks: [], notes: '', expanded: false, timerMinutes: 25, pendingDone: false },
            { id: 3, text: 'Go for a walk', done: false, priority: 'high', createdAt: Date.now() - 1000, subtasks: [], notes: '', expanded: false, timerMinutes: 25, pendingDone: false }
          ];
          nextId = 4;
        }
      } catch (e) { todos = []; }

      // Dark mode
      darkMode = localStorage.getItem('dark_mode') === '1';
      if (darkMode) {
        document.documentElement.setAttribute('data-theme', 'dark');
        document.getElementById('dark-btn').textContent = 'Light mode';
      }

      // Theme
      accentTheme = localStorage.getItem('accent_theme') || 'green';
      applyTheme(accentTheme, false);

      // Sort
      sortOrder = localStorage.getItem('sort_order') || 'newest';
      var sortBtn = document.getElementById('sort-toggle');
      if (sortBtn) sortBtn.textContent = sortOrder === 'newest' ? 'Recent first' : 'Oldest first';

      // Streaks
      try {
        var sd = localStorage.getItem('streak_dates');
        streakDates = sd ? JSON.parse(sd) : [];
      } catch (e) { streakDates = []; }
      updateStreakDisplay();
    }

    function saveTasks() {
      try { localStorage.setItem('tasks_v2', JSON.stringify(todos)); } catch (e) { }
    }

    /* ===== DARK MODE ===== */
    function toggleDark() {
      darkMode = !darkMode;
      document.documentElement.setAttribute('data-theme', darkMode ? 'dark' : '');
      document.getElementById('dark-btn').textContent = darkMode ? 'Light mode' : 'Dark mode';
      localStorage.setItem('dark_mode', darkMode ? '1' : '0');
      applyTheme(accentTheme, false);
    }

    /* ===== THEMES ===== */
    function applyTheme(name, save) {
      var t = THEMES[name] || THEMES.green;
      var accent = darkMode ? t.darkAccent : t.accent;
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--accent-light', t.light);
      accentTheme = name;
      if (save !== false) localStorage.setItem('accent_theme', name);
      // Update active swatch
      document.querySelectorAll('.palette-swatch').forEach(function (s) {
        s.classList.toggle('active', s.dataset.theme === name);
      });
      // Update palette button color
      var pb = document.getElementById('palette-btn');
      if (pb) pb.style.color = THEME_COLORS[name] || THEME_COLORS.green;
    }

    function buildPalette() {
      var panel = document.getElementById('palette-panel');
      var names = Object.keys(THEMES);
      names.forEach(function (name) {
        var sw = document.createElement('button');
        sw.className = 'palette-swatch';
        sw.dataset.theme = name;
        sw.style.background = THEME_COLORS[name];
        sw.title = name.charAt(0).toUpperCase() + name.slice(1);
        if (name === accentTheme) sw.classList.add('active');
        sw.onclick = function () { applyTheme(name); render(); };
        panel.appendChild(sw);
      });
    }

    function togglePalette(e) {
      e.stopPropagation();
      var panel = document.getElementById('palette-panel');
      panel.style.display = panel.style.display === 'none' ? 'flex' : 'none';
    }

    /* ===== ADD TASK (step 1) ===== */
    function addTask() {
      var input = document.getElementById('task-input');
      var text = input.value.trim();
      if (!text) return;
      pendingPriorityTaskText = text;
      input.value = '';
      document.getElementById('priority-picker').style.display = 'flex';
      document.getElementById('priority-picker').querySelector('button').focus();
    }

    /* ===== ADD TASK (step 2: priority chosen) ===== */
    function confirmPriority(p) {
      if (!pendingPriorityTaskText) return;
      var text = pendingPriorityTaskText;
      pendingPriorityTaskText = null;
      document.getElementById('priority-picker').style.display = 'none';
      todos.unshift({
        id: nextId++, text: text, done: false, priority: p,
        createdAt: Date.now(), subtasks: [], notes: '', expanded: false,
        timerMinutes: 25, pendingDone: false
      });
      saveTasks();
      render();
    }

    /* ===== TOGGLE TASK (delayed done) ===== */
    function toggleTask(id) {
      var t = null;
      for (var i = 0; i < todos.length; i++) { if (todos[i].id === id) { t = todos[i]; break; } }
      if (!t) return;

      // Unchecking
      if (t.done) {
        t.done = false;
        saveTasks();
        render();
        return;
      }

      // Cancel pending if double-clicked
      if (pendingDoneTimers[id]) {
        clearTimeout(pendingDoneTimers[id]);
        delete pendingDoneTimers[id];
        t.pendingDone = false;
        saveTasks();
        render();
        return;
      }

      // Stop timer if running on this task
      if (activeTimerId === id) stopTimer();

      // Mark as pending-done immediately
      t.pendingDone = true;
      var el = document.querySelector('[data-id="' + id + '"]');
      if (el) { el.classList.add('pending-done'); }

      pendingDoneTimers[id] = setTimeout(function () {
        delete pendingDoneTimers[id];
        // Re-find task (may have been deleted during wait)
        var found = null;
        for (var i = 0; i < todos.length; i++) { if (todos[i].id === id) { found = todos[i]; break; } }
        if (!found) return;
        found.pendingDone = false;
        found.done = true;
        recordStreak();
        saveTasks();
        render();
        // Flash green after re-render
        setTimeout(function () {
          var el2 = document.querySelector('[data-id="' + id + '"]');
          if (el2) { el2.classList.add('flash-green'); setTimeout(function () { el2.classList.remove('flash-green'); }, 700); }
        }, 10);
        launchConfetti();
      }, 2500);
    }

    /* ===== DELETE ===== */
    function deleteTask(id) {
      var idx = -1;
      for (var i = 0; i < todos.length; i++) { if (todos[i].id === id) { idx = i; break; } }
      if (idx === -1) return;
      if (pendingDoneTimers[id]) { clearTimeout(pendingDoneTimers[id]); delete pendingDoneTimers[id]; }
      if (activeTimerId === id) stopTimer();
      lastDeleted = { task: JSON.parse(JSON.stringify(todos[idx])), index: idx };
      todos.splice(idx, 1);
      saveTasks();
      render();
      showUndoToast();
    }

    function clearDone() {
      if (pendingDoneTimers) {
        todos.forEach(function (t) {
          if (t.done && pendingDoneTimers[t.id]) { clearTimeout(pendingDoneTimers[t.id]); delete pendingDoneTimers[t.id]; }
        });
      }
      todos = todos.filter(function (t) { return !t.done; });
      lastDeleted = null;
      saveTasks();
      render();
    }

    /* ===== UNDO ===== */
    function showUndoToast() {
      var toast = document.getElementById('undo-toast');
      toast.classList.remove('hidden');
      if (undoToastTimer) clearTimeout(undoToastTimer);
      undoToastTimer = setTimeout(function () {
        toast.classList.add('hidden');
        lastDeleted = null;
      }, 4000);
    }

    function undoDelete() {
      if (!lastDeleted) return;
      if (undoToastTimer) { clearTimeout(undoToastTimer); undoToastTimer = null; }
      document.getElementById('undo-toast').classList.add('hidden');
      var d = lastDeleted;
      lastDeleted = null;
      var idx = Math.min(d.index, todos.length);
      todos.splice(idx, 0, d.task);
      saveTasks();
      render();
    }

    /* ===== FILTER / SORT ===== */
    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-btn').forEach(function (b) { b.classList.remove('active'); });
      btn.classList.add('active');
      render();
    }

    function setPriorityFilter(p, btn) {
      if (priorityFilter === p) {
        priorityFilter = null;
        document.querySelectorAll('.pfil-btn').forEach(function (b) { b.classList.remove('active'); });
      } else {
        priorityFilter = p;
        document.querySelectorAll('.pfil-btn').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
      }
      render();
    }

    function toggleSort() {
      sortOrder = sortOrder === 'newest' ? 'oldest' : 'newest';
      document.getElementById('sort-toggle').textContent = sortOrder === 'newest' ? 'Recent first' : 'Oldest first';
      localStorage.setItem('sort_order', sortOrder);
      render();
    }

    /* ===== INLINE EDIT ===== */
    function startEdit(id, el) {
      var t = null;
      for (var i = 0; i < todos.length; i++) { if (todos[i].id === id) { t = todos[i]; break; } }
      if (!t || t.done) return;
      var span = el.querySelector('.todo-text');
      if (!span) return;
      var inp = document.createElement('input');
      inp.className = 'edit-input';
      inp.value = t.text;
      span.replaceWith(inp);
      inp.focus(); inp.select();
      inp.addEventListener('blur', function () { finishEdit(id, inp.value); });
      inp.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') inp.blur();
        if (e.key === 'Escape') { inp.value = t.text; inp.blur(); }
      });
    }

    function finishEdit(id, val) {
      for (var i = 0; i < todos.length; i++) {
        if (todos[i].id === id) { if (val.trim()) todos[i].text = val.trim(); break; }
      }
      saveTasks();
      render();
    }

    /* ===== EXPAND / SUBTASKS / NOTES ===== */
    function toggleExpand(id) {
      for (var i = 0; i < todos.length; i++) {
        if (todos[i].id === id) { todos[i].expanded = !todos[i].expanded; break; }
      }
      render();
    }

    function addSubtask(taskId, inputEl) {
      var text = inputEl.value.trim();
      if (!text) return;
      for (var i = 0; i < todos.length; i++) {
        if (todos[i].id === taskId) {
          var subId = Date.now();
          todos[i].subtasks.push({ id: subId, text: text, done: false });
          break;
        }
      }
      saveTasks();
      render();
    }

    function toggleSubtask(taskId, subId) {
      for (var i = 0; i < todos.length; i++) {
        if (todos[i].id === taskId) {
          for (var j = 0; j < todos[i].subtasks.length; j++) {
            if (todos[i].subtasks[j].id === subId) { todos[i].subtasks[j].done = !todos[i].subtasks[j].done; break; }
          }
          break;
        }
      }
      saveTasks();
      render();
    }

    function deleteSubtask(taskId, subId) {
      for (var i = 0; i < todos.length; i++) {
        if (todos[i].id === taskId) {
          todos[i].subtasks = todos[i].subtasks.filter(function (s) { return s.id !== subId; });
          break;
        }
      }
      saveTasks();
      render();
    }

    function saveNotes(taskId, val) {
      for (var i = 0; i < todos.length; i++) {
        if (todos[i].id === taskId) { todos[i].notes = val; break; }
      }
      saveTasks();
    }

    /* ===== TIMER ===== */
    function toggleTimer(id) {
      // If clicking the active timer's button, stop the timer (hide inline row)
      if (activeTimerId === id) {
        stopTimer();
        return;
      }
      // If another timer is running, stop it first
      if (activeTimerId !== null) stopTimer();

      var t = null;
      for (var i = 0; i < todos.length; i++) { if (todos[i].id === id) { t = todos[i]; break; } }
      if (!t) return;

      activeTimerId = id;
      activeTimerSecondsLeft = (t.timerMinutes || 25) * 60;
      activeTimerPaused = false;
      render();
      restoreTimerUI();
      startTimerInterval();
    }

    function startTimerInterval() {
      if (activeTimerInterval) clearInterval(activeTimerInterval);
      activeTimerInterval = setInterval(function () {
        if (activeTimerPaused) return;
        activeTimerSecondsLeft--;
        updateTimerDisplay();
        if (activeTimerSecondsLeft <= 0) timerDone();
      }, 1000);
    }

    function pauseResumeTimer(id) {
      if (activeTimerId !== id) return;
      activeTimerPaused = !activeTimerPaused;
      var btn = document.getElementById('tpause-' + id);
      if (btn) btn.textContent = activeTimerPaused ? '▶' : '⏸';
    }

    function setTimerPreset(id, minutes) {
      if (activeTimerId !== id) return;
      for (var i = 0; i < todos.length; i++) {
        if (todos[i].id === id) { todos[i].timerMinutes = parseInt(minutes); break; }
      }
      activeTimerSecondsLeft = parseInt(minutes) * 60;
      activeTimerPaused = false;
      updateTimerDisplay();
    }

    function updateTimerDisplay() {
      var el = document.getElementById('tcountdown-' + activeTimerId);
      if (el) el.textContent = formatTime(activeTimerSecondsLeft);
    }

    function formatTime(secs) {
      var m = Math.floor(secs / 60), s = secs % 60;
      return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
    }

    function stopTimer() {
      if (activeTimerInterval) { clearInterval(activeTimerInterval); activeTimerInterval = null; }
      var prevId = activeTimerId;
      activeTimerId = null;
      activeTimerSecondsLeft = 0;
      activeTimerPaused = false;
      if (prevId !== null) render();
    }

    function timerDone() {
      clearInterval(activeTimerInterval); activeTimerInterval = null;
      var doneId = activeTimerId;
      activeTimerId = null;
      playBeep();
      var el = document.querySelector('[data-id="' + doneId + '"]');
      if (el) {
        el.classList.add('timer-flash');
        setTimeout(function () { if (el) el.classList.remove('timer-flash'); }, 1600);
      }
      render();
    }

    function playBeep() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = 880;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
        osc.start(); osc.stop(ctx.currentTime + 1);
      } catch (e) { }
    }

    function restoreTimerUI() {
      if (activeTimerId === null) return;
      var timerRow = document.getElementById('trow-' + activeTimerId);
      if (timerRow) {
        timerRow.classList.add('visible');
        var cd = document.getElementById('tcountdown-' + activeTimerId);
        if (cd) cd.textContent = formatTime(activeTimerSecondsLeft);
        var pauseBtn = document.getElementById('tpause-' + activeTimerId);
        if (pauseBtn) pauseBtn.textContent = activeTimerPaused ? '▶' : '⏸';
        var tbtn = document.querySelector('[data-timer-id="' + activeTimerId + '"]');
        if (tbtn) tbtn.classList.add('active');
        // Set correct preset value
        var preset = document.getElementById('tpreset-' + activeTimerId);
        if (preset) {
          for (var i = 0; i < todos.length; i++) {
            if (todos[i].id === activeTimerId) { preset.value = todos[i].timerMinutes; break; }
          }
        }
      }
    }

    /* ===== DRAG & DROP ===== */
    function onDragStart(e, id) {
      dragSrcId = id;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(function () {
        var el = document.querySelector('[data-id="' + id + '"]');
        if (el) el.classList.add('dragging');
      }, 0);
    }

    function onDragEnd() {
      document.querySelectorAll('.todo-item').forEach(function (el) {
        el.classList.remove('dragging'); el.classList.remove('drag-over');
      });
    }

    function onDragOver(e, id) {
      e.preventDefault();
      document.querySelectorAll('.todo-item').forEach(function (el) { el.classList.remove('drag-over'); });
      if (id !== dragSrcId) {
        var el = document.querySelector('[data-id="' + id + '"]');
        if (el) el.classList.add('drag-over');
      }
    }

    function onDrop(e, targetId) {
      e.preventDefault();
      if (dragSrcId === targetId) return;
      var srcIdx = -1, tgtIdx = -1;
      for (var i = 0; i < todos.length; i++) {
        if (todos[i].id === dragSrcId) srcIdx = i;
        if (todos[i].id === targetId) tgtIdx = i;
      }
      if (srcIdx === -1 || tgtIdx === -1) return;
      var moved = todos.splice(srcIdx, 1)[0];
      todos.splice(tgtIdx, 0, moved);
      saveTasks();
      render();
    }

    /* ===== STREAKS ===== */
    function todayStr() {
      var d = new Date();
      return d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
    }

    function recordStreak() {
      var today = todayStr();
      if (streakDates.indexOf(today) === -1) {
        streakDates.push(today);
        try { localStorage.setItem('streak_dates', JSON.stringify(streakDates)); } catch (e) { }
        updateStreakDisplay();
      }
    }

    function calculateStreak() {
      if (streakDates.length === 0) return 0;
      var set = {};
      streakDates.forEach(function (d) { set[d] = true; });
      var count = 0;
      var cur = new Date();
      // Allow today OR yesterday as the "end" of streak
      if (!set[todayStr()]) {
        var yesterday = new Date(cur); yesterday.setDate(yesterday.getDate() - 1);
        var yStr = yesterday.getFullYear() + '-' + ('0' + (yesterday.getMonth() + 1)).slice(-2) + '-' + ('0' + yesterday.getDate()).slice(-2);
        if (!set[yStr]) return 0;
        cur = yesterday;
      }
      while (true) {
        var s = cur.getFullYear() + '-' + ('0' + (cur.getMonth() + 1)).slice(-2) + '-' + ('0' + cur.getDate()).slice(-2);
        if (set[s]) { count++; cur.setDate(cur.getDate() - 1); } else break;
      }
      return count;
    }

    function updateStreakDisplay() {
      var streak = calculateStreak();
      var badge = document.getElementById('streak-badge');
      if (!badge) return;
      badge.textContent = streak >= 2 ? '🔥 ' + streak + '-day streak!' : '';
    }

    /* ===== PROGRESS RINGS ===== */
    function updateRings() {
      var groups = { high: { total: 0, done: 0 }, medium: { total: 0, done: 0 }, low: { total: 0, done: 0 } };
      todos.forEach(function (t) {
        if (groups[t.priority]) {
          groups[t.priority].total++;
          if (t.done) groups[t.priority].done++;
        }
      });
      ['high', 'medium', 'low'].forEach(function (p) {
        var g = groups[p];
        var pct = g.total > 0 ? Math.round((g.done / g.total) * 100) : -1;
        var fill = document.getElementById('ring-' + p);
        var pctEl = document.getElementById('ring-' + p + '-pct');
        if (fill) fill.setAttribute('stroke-dasharray', pct > 0 ? (pct + ' ' + (100 - pct)) : '0 100');
        if (pctEl) pctEl.textContent = pct >= 0 ? (pct + '%') : '—';
      });
    }

    /* ===== RENDER ===== */
    function render() {
      var list = document.getElementById('todo-list');

      // Build visible list
      var visible = [];
      for (var i = 0; i < todos.length; i++) {
        var t = todos[i];
        if (filter === 'done' && !t.done) continue;
        if (filter === 'active' && t.done) continue;
        if (priorityFilter && t.priority !== priorityFilter) continue;
        visible.push(t);
      }

      // Sort (copy only)
      visible = visible.slice().sort(function (a, b) {
        return sortOrder === 'newest' ? (b.createdAt - a.createdAt) : (a.createdAt - b.createdAt);
      });

      // Progress bar + count
      var total = todos.length, doneCount = 0;
      todos.forEach(function (t) { if (t.done) doneCount++; });
      var active = total - doneCount;
      var pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
      document.getElementById('progress').style.width = pct + '%';
      document.getElementById('count-label').textContent =
        active === 0 ? 'All tasks completed!' : active + ' task' + (active !== 1 ? 's' : '') + ' remaining';

      updateRings();

      if (visible.length === 0) {
        list.innerHTML = '<div class="empty">Nothing here yet</div>';
        return;
      }

      var html = '';
      for (var i = 0; i < visible.length; i++) {
        var t = visible[i];
        var itemClass = 'todo-item' +
          (t.done ? ' done' : '') +
          (t.pendingDone ? ' pending-done' : '') +
          (t.expanded ? ' expanded' : '');

        html += '<div class="' + itemClass + '" data-id="' + t.id + '" draggable="true"' +
          ' ondragstart="onDragStart(event,' + t.id + ')"' +
          ' ondragend="onDragEnd()"' +
          ' ondragover="onDragOver(event,' + t.id + ')"' +
          ' ondrop="onDrop(event,' + t.id + ')">' +

          // Main row
          '<div class="task-main-row" ondblclick="startEdit(' + t.id + ',this.parentElement)">' +
          '<span class="drag-handle">&#8942;</span>' +
          '<span class="priority-dot dot-' + (t.priority || 'none') + '"></span>' +
          '<div class="check-btn ' + (t.done || t.pendingDone ? 'checked' : '') + '" onclick="toggleTask(' + t.id + ')"></div>' +
          '<span class="todo-text">' + escHtml(t.text) + '</span>' +
          '<button class="expand-btn" onclick="toggleExpand(' + t.id + ')" title="Notes & subtasks">&#9660;</button>' +
          '<button class="timer-btn ' + (activeTimerId === t.id ? 'active' : '') + '" data-timer-id="' + t.id + '" onclick="toggleTimer(' + t.id + ')" title="Focus timer">&#9654;</button>' +
          '<button class="delete-btn" onclick="deleteTask(' + t.id + ')">&#215;</button>' +
          '</div>' +

          // Timer row (hidden by default, restored by restoreTimerUI)
          '<div class="timer-row" id="trow-' + t.id + '">' +
          '<select class="timer-preset" id="tpreset-' + t.id + '" onchange="setTimerPreset(' + t.id + ',this.value)">' +
          '<option value="5"' + (t.timerMinutes === 5 ? ' selected' : '') + '>5 min</option>' +
          '<option value="10"' + (t.timerMinutes === 10 ? ' selected' : '') + '>10 min</option>' +
          '<option value="25"' + (t.timerMinutes === 25 ? ' selected' : '') + '>25 min</option>' +
          '<option value="45"' + (t.timerMinutes === 45 ? ' selected' : '') + '>45 min</option>' +
          '</select>' +
          '<span class="timer-countdown" id="tcountdown-' + t.id + '">' + formatTime(t.timerMinutes * 60) + '</span>' +
          '<button class="timer-pause-btn" id="tpause-' + t.id + '" onclick="pauseResumeTimer(' + t.id + ')">&#9646;&#9646;</button>' +
          '</div>' +

          // Expansion panel
          '<div class="expansion-panel">' +
          '<textarea class="notes-area" placeholder="Notes, links, thoughts..." oninput="saveNotes(' + t.id + ',this.value)">' + escHtml(t.notes || '') + '</textarea>' +
          '<div class="subtask-list">';

        if (t.subtasks && t.subtasks.length > 0) {
          t.subtasks.forEach(function (s) {
            html += '<div class="subtask-item">' +
              '<div class="subtask-check ' + (s.done ? 'done' : '') + '" onclick="toggleSubtask(' + t.id + ',' + s.id + ')"></div>' +
              '<span class="subtask-text ' + (s.done ? 'done' : '') + '">' + escHtml(s.text) + '</span>' +
              '<button class="subtask-del" onclick="deleteSubtask(' + t.id + ',' + s.id + ')">&#215;</button>' +
              '</div>';
          });
        }

        html += '</div>' +
          '<div class="subtask-input-row">' +
          '<input class="subtask-input" type="text" placeholder="Add a subtask..." id="si-' + t.id + '"' +
          ' onkeydown="if(event.key===\'Enter\')addSubtask(' + t.id + ',this)"/>' +
          '</div>' +
          '</div>' + // expansion-panel
          '</div>'; // todo-item
      }

      list.innerHTML = html;
      restoreTimerUI();
    }

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    /* ===== CONFETTI ===== */
    var canvas = document.getElementById('confetti-canvas');
    var ctx = canvas.getContext('2d');
    var particles = [];
    var animFrame = null;

    function launchConfetti() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      var colors = ['#52B788', '#2D6A4F', '#95D5B2', '#FFD166', '#EF476F', '#118AB2'];
      for (var i = 0; i < 80; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height * 0.4,
          r: Math.random() * 6 + 3,
          color: colors[Math.floor(Math.random() * colors.length)],
          tiltAngle: 0, tiltSpeed: Math.random() * 0.1 + 0.05,
          vy: Math.random() * 3 + 2
        });
      }
      if (!animFrame) animateConfetti();
      setTimeout(function () {
        particles = [];
        if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 2200);
    }

    function animateConfetti() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        ctx.beginPath(); ctx.fillStyle = p.color;
        ctx.ellipse(p.x, p.y, p.r, p.r / 2, p.tiltAngle, 0, Math.PI * 2);
        ctx.fill();
        p.y += p.vy; p.tiltAngle += p.tiltSpeed; p.x += Math.sin(p.tiltAngle) * 1.5;
      }
      animFrame = requestAnimationFrame(animateConfetti);
    }

    /* ===== CINEMATIC FOCUS MODE ===== */
    function buildMovieGrid() {
      var grid = document.getElementById('movie-grid');
      var keys = Object.keys(MOVIES);
      keys.forEach(function (key) {
        var m = MOVIES[key];
        var card = document.createElement('div');
        card.className = 'movie-card';
        card.style.backgroundImage = "url('" + m.image + "')";
        card.innerHTML = '<div class="movie-card-info"><h3>' + m.title + '</h3><p>' + m.tagline + '</p></div>';
        card.onclick = function () { selectMovie(key); };
        grid.appendChild(card);
      });
    }

    function openFocus() {
      // Don't stop active timer, let it carry over to cinematic mode
      focusMode._timerLaunch = false;
      var overlay = document.getElementById('focus-overlay');
      overlay.style.display = 'flex';
      requestAnimationFrame(function () { overlay.classList.add('visible'); });
    }

    function openFocusForTimer() {
      // Timer already started — open movie selection, skip task picker after
      var overlay = document.getElementById('focus-overlay');
      overlay.style.display = 'flex';
      requestAnimationFrame(function () { overlay.classList.add('visible'); });
    }

    function selectMovie(key) {
      focusMode.movie = key;
      var overlay = document.getElementById('focus-overlay');
      overlay.classList.remove('visible');
      setTimeout(function () {
        overlay.style.display = 'none';
        // If launched from timer, skip task picker — go straight to cinematic
        if (focusMode._timerLaunch && focusMode.taskId) {
          focusMode._timerLaunch = false;
          showCinematic();
        } else {
          showTaskPicker();
        }
      }, 400);
    }

    function showTaskPicker() {
      var picker = document.getElementById('focus-task-picker');
      var listEl = document.getElementById('focus-task-list');
      listEl.innerHTML = '';
      var activeTasks = todos.filter(function (t) { return !t.done && !t.pendingDone; });
      if (activeTasks.length === 0) {
        listEl.innerHTML = '<div style="color:rgba(255,255,255,0.5);text-align:center;font-size:0.9rem">No active tasks</div>';
      } else {
        activeTasks.forEach(function (t) {
          var btn = document.createElement('div');
          btn.className = 'focus-task-item';
          btn.textContent = t.text;
          btn.onclick = function () { selectFocusTask(t.id); };
          listEl.appendChild(btn);
        });
      }
      picker.style.display = 'flex';
      requestAnimationFrame(function () { picker.classList.add('visible'); });
    }

    function selectFocusTask(taskId) {
      focusMode.taskId = taskId;
      var picker = document.getElementById('focus-task-picker');
      picker.classList.remove('visible');
      setTimeout(function () {
        picker.style.display = 'none';
        showCinematic();
      }, 400);
    }

    function showCinematic() {
      var m = MOVIES[focusMode.movie];

      // Set full-screen image via <img> tag for sharpness
      var img = document.getElementById('cinematic-img');
      img.src = m.image;

      // Show movie quote (italic) instead of task name
      document.getElementById('cinematic-task-text').textContent = m.quote;
      document.getElementById('cinematic-movie-title').textContent = m.title;

      // Show timer if active
      var timerEl = document.getElementById('cinematic-timer');
      if (activeTimerId !== null) {
        timerEl.style.display = '';
        timerEl.textContent = formatTime(activeTimerSecondsLeft);
        // Update cinematic timer every second
        if (focusMode._timerPollInterval) clearInterval(focusMode._timerPollInterval);
        focusMode._timerPollInterval = setInterval(function () {
          if (activeTimerId !== null) {
            timerEl.textContent = formatTime(activeTimerSecondsLeft);
          } else {
            timerEl.style.display = 'none';
            clearInterval(focusMode._timerPollInterval);
          }
        }, 500);
      } else {
        timerEl.style.display = 'none';
      }

      var cinematic = document.getElementById('focus-cinematic');
      cinematic.style.display = 'flex';
      requestAnimationFrame(function () { cinematic.classList.add('visible'); });

      // Start local music
      if (focusMode.audio) { focusMode.audio.pause(); focusMode.audio = null; }
      focusMode.audio = new Audio(m.music);
      focusMode.audio.loop = true;
      focusMode.audio.play().then(function () {
        focusMode.playing = true;
        document.getElementById('equalizer').classList.remove('paused');
        document.getElementById('cinematic-play-btn').innerHTML = '&#9646;&#9646;';
      }).catch(function () {
        focusMode.playing = false;
        document.getElementById('cinematic-play-btn').innerHTML = '&#9654;';
      });

      focusMode.active = true;
    }

    function toggleFocusAudio() {
      if (!focusMode.audio) return;
      if (focusMode.playing) {
        focusMode.audio.pause();
        focusMode.playing = false;
        document.getElementById('equalizer').classList.add('paused');
        document.getElementById('cinematic-play-btn').innerHTML = '&#9654;';
      } else {
        focusMode.audio.play().catch(function () { });
        focusMode.playing = true;
        document.getElementById('equalizer').classList.remove('paused');
        document.getElementById('cinematic-play-btn').innerHTML = '&#9646;&#9646;';
      }
    }

    function exitFocus() {
      // Stop audio
      if (focusMode.audio) { focusMode.audio.pause(); focusMode.audio = null; }
      focusMode.playing = false;
      focusMode.active = false;

      // Clear timer display polling
      if (focusMode._timerPollInterval) { clearInterval(focusMode._timerPollInterval); focusMode._timerPollInterval = null; }

      // Fade out all layers
      ['focus-overlay', 'focus-task-picker', 'focus-cinematic'].forEach(function (id) {
        var el = document.getElementById(id);
        el.classList.remove('visible');
        setTimeout(function () { el.style.display = 'none'; }, 500);
      });
    }
  </script>
</body>

</html>
